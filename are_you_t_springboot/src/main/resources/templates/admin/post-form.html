<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #fff; color: #000; }
    .container { margin-top: 50px; }
    .btn { border: 1px solid #000; color: #000; background-color: transparent; }
    .btn:hover { background-color: #000; color: #fff; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">게시글 작성</h2>

  <form th:action="@{/admin/posts/create}" th:object="${post}" method="post">

    <input type="hidden" name="memberId" th:value="${memberId}" />

    <div class="mb-3">
      <label class="form-label">제목</label>
      <input type="text" class="form-control" th:field="*{title}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">내용</label>
      <textarea class="form-control" rows="5" th:field="*{content}" required></textarea>
    </div>

    <button type="submit" class="btn w-100">게시글 저장</button>
  </form>
</div>

</body>
</html>
