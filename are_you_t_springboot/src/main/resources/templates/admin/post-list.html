<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 목록</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #fff; color: #000; }
    .container { margin-top: 50px; }
    .table { color: #000; background-color: #fff; }
    .table thead { background-color: #f8f9fa; }
    .btn-group { display: flex; gap: 10px; }
    .btn { border: 1px solid #000; color: #000; background-color: transparent; }
    .btn:hover { background-color: #000; color: #fff; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">게시글 목록</h2>

  <a href="/admin/posts/create" class="btn mb-3">게시글 작성</a>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>ID</th>
      <th>제목</th>
      <th>작성자</th>
      <th>좋아요</th>
      <th>댓글</th>
      <th>작성일</th>
      <th>액션</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
      <td th:text="${post.id}"></td>
      <td th:text="${post.title}"></td>
      <td th:text="${post.authorNickname}"></td>
      <td th:text="${post.likesCount}"></td>
      <td th:text="${post.commentsCount}"></td>
      <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
      <td class="btn-group">
        <form th:action="@{/admin/posts/delete/{id}(id=${post.id})}" method="post">
          <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
