<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>댓글 작성/수정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #fff; color: #000; }
    .container { margin-top: 50px; }
  </style>
</head>
<body>

<div class="container">
  <h2 th:text="${comment.id == null ? '댓글 작성' : '댓글 수정'}" class="mb-4"></h2>

  <form th:action="@{${comment.id == null} ? '/admin/comments/create' : '/admin/comments/update/' + ${comment.id}}"
        th:object="${comment}" method="post">

    <div class="mb-3">
      <label class="form-label">게시글 ID</label>
      <input type="number" class="form-control" th:field="*{postId}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">작성자 ID</label>
      <input type="number" class="form-control" th:field="*{memberId}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">댓글 내용</label>
      <textarea class="form-control" rows="5" th:field="*{content}" required></textarea>
    </div>

    <button type="submit" class="btn btn-dark w-100" th:text="${comment.id == null ? '댓글 추가' : '댓글 수정'}"></button>
  </form>

  <a href="/admin/comments" class="btn btn-secondary mt-3">목록으로</a>
</div>

</body>
</html>
