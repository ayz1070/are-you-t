<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #000; color: #fff; }
    .container { padding-top: 50px; }
    table { background-color: #121212; color: #fff; }
    .btn-group { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .btn { width: 150px; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center mb-4">회원 관리</h2>

  <div class="btn-group">
    <a href="/admin/members/add" class="btn btn-outline-light">회원 추가</a>
  </div>

  <table class="table table-dark table-striped text-center">
    <thead>
    <tr>
      <th>ID</th>
      <th>닉네임</th>
      <th>MBTI</th>
      <th>역할</th>
      <th>상태</th>
      <th>가입일</th>
      <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="member : ${members}">
      <td th:text="${member.id}"></td>
      <td th:text="${member.nickname}"></td>
      <td th:text="${member.mbti}"></td>
      <td th:text="${member.role}"></td>
      <td th:text="${member.status}"></td>
      <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd')}"></td>
      <td>
        <form th:action="@{/admin/members/delete/{id}(id=${member.id})}" method="post">
          <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
