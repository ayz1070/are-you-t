<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>댓글 목록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fff; color: #000; }
        .container { margin-top: 50px; }
        .table th, .table td { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">댓글 목록</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>게시글 ID</th>
            <th>작성자</th>
            <th>내용</th>
            <th>작성일</th>
            <th>수정됨</th>
            <th>삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${comments}">
            <td th:text="${comment.id}"></td>
            <td th:text="${comment.postId}"></td>
            <td th:text="${comment.authorNickname}"></td>
            <td th:text="${comment.content}"></td>
            <td th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${comment.isEdited ? '✔' : '✘'}"></td>
            <td>
                <form th:action="@{/admin/comments/delete/{id}(id=${comment.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/admin" class="btn btn-secondary">관리자 홈으로</a>
</div>

</body>
</html>
