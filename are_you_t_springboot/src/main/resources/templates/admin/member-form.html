<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 추가</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #000; color: #fff; }
    .container { max-width: 500px; padding-top: 50px; }
    .form-control { background-color: #121212; color: #fff; border: 1px solid #fff; }
    .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center mb-4">회원 추가</h2>

  <form th:action="@{/admin/members/add}" th:object="${memberRequest}" method="post">

    <div class="mb-3">
      <label class="form-label">소셜 ID</label>
      <input type="text" class="form-control" th:field="*{socialId}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">닉네임</label>
      <input type="text" class="form-control" th:field="*{nickname}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">MBTI</label>
      <select class="form-control" th:field="*{mbti}" required>
        <option value="" disabled selected>선택</option>
        <option th:each="type : ${T(study.are_you_t_springboot.entity.type.MbtiType).values()}"
                th:value="${type}" th:text="${type}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">로그인 제공자</label>
      <select class="form-control" th:field="*{provider}" required>
        <option value="" disabled selected>선택</option>
        <option th:each="prov : ${T(study.are_you_t_springboot.entity.type.Provider).values()}"
                th:value="${prov}" th:text="${prov}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">프로필 이미지 URL</label>
      <input type="text" class="form-control" th:field="*{profileImageUrl}">
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-light">추가</button>
      <a href="/admin/members" class="btn btn-outline-light">취소</a>
    </div>

  </form>
</div>

</body>
</html>
